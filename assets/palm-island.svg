<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" aria-hidden="true">
  <!-- island base + water ripples -->
  <g stroke="currentColor" stroke-linecap="round" fill="none">
    <!-- horizontal water lines on either side -->
    <path d="M0 130 Q 25 128 50 130" stroke-width="1.1" opacity="0.85"/>
    <path d="M150 130 Q 175 128 200 130" stroke-width="1.1" opacity="0.85"/>
    <path d="M5 138 Q 30 136 55 138" stroke-width="0.9" opacity="0.6"/>
    <path d="M145 138 Q 170 136 195 138" stroke-width="0.9" opacity="0.6"/>
    <!-- island mound -->
    <path d="M55 130 Q 100 105 145 130 Q 100 138 55 130 Z"
          stroke-width="1.5" fill="currentColor" opacity="0.92"/>
    <!-- island texture stitches -->
    <path d="M70 124 Q 100 116 130 124"
          stroke-width="0.7" stroke-dasharray="1 2" opacity="0.5"/>
  </g>

  <!-- LEFT (taller) palm -->
  <g stroke="currentColor" fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- trunk -->
    <path d="M82 118 Q 78 90 80 60 Q 82 40 86 22"
          stroke-width="2.6" fill="none"/>
    <!-- trunk ridges (embroidery) -->
    <path d="M82 118 Q 78 90 80 60 Q 82 40 86 22"
          stroke-width="0.7" stroke-dasharray="1.2 3" fill="none" opacity="0.6"
          transform="translate(1.5 0)"/>
    <!-- fronds (drooping outward) -->
    <g stroke-width="1.8" stroke-dasharray="1.6 1.8" fill="none">
      <path d="M86 22 Q 64 22 46 32 Q 60 30 78 30"/>
      <path d="M86 22 Q 108 18 124 30 Q 108 26 92 32"/>
      <path d="M86 22 Q 72 8 58 0 Q 74 14 84 20"/>
      <path d="M86 22 Q 102 6 118 0 Q 102 14 90 22"/>
      <path d="M86 22 Q 70 38 52 50 Q 72 42 86 32"/>
      <path d="M86 22 Q 102 38 120 50 Q 102 42 90 32"/>
      <path d="M86 22 Q 86 8 88 -2"/>
    </g>
    <!-- coconuts -->
    <circle cx="84" cy="26" r="2.4"/>
    <circle cx="91" cy="28" r="2"/>
    <circle cx="80" cy="29" r="1.8"/>
  </g>

  <!-- RIGHT (shorter, leaning right) palm -->
  <g stroke="currentColor" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" transform="translate(28 0)">
    <path d="M88 122 Q 92 95 92 75 Q 90 55 86 42"
          stroke-width="2.2" fill="none"/>
    <path d="M88 122 Q 92 95 92 75 Q 90 55 86 42"
          stroke-width="0.6" stroke-dasharray="1.2 3" fill="none" opacity="0.6"
          transform="translate(-1.2 0)"/>
    <g stroke-width="1.5" stroke-dasharray="1.6 1.8" fill="none">
      <path d="M86 42 Q 70 38 58 46"/>
      <path d="M86 42 Q 102 38 116 46"/>
      <path d="M86 42 Q 74 26 64 18"/>
      <path d="M86 42 Q 98 26 110 18"/>
      <path d="M86 42 Q 76 56 64 64"/>
      <path d="M86 42 Q 96 56 108 64"/>
    </g>
    <circle cx="84" cy="46" r="1.8"/>
    <circle cx="89" cy="47" r="1.6"/>
  </g>
</svg>
