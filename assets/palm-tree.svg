<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none" aria-hidden="true">
  <defs>
    <filter id="embroidery" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>
  <g class="palm-group" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">

    <!-- ground line (sand) -->
    <path d="M10 215 Q 100 222 190 215" stroke-width="1.4" stroke-dasharray="3 4" fill="none" opacity="0.55"/>

    <!-- LEFT PALM (taller) -->
    <g transform="translate(70 0)">
      <!-- trunk -->
      <path d="M0 215 Q -4 170 -2 130 Q 0 95 4 60"
            stroke-width="3.5" fill="none"/>
      <!-- trunk stitch ridges -->
      <path d="M0 215 Q -4 170 -2 130 Q 0 95 4 60"
            stroke-width="1" stroke-dasharray="1.5 4" fill="none" opacity="0.7"
            transform="translate(2 0)"/>
      <!-- fronds: 7 leaves radiating from top -->
      <g stroke-width="2.4" fill="none" stroke-dasharray="2 2.5">
        <path d="M4 60 Q -25 50 -55 58 Q -40 55 -20 65"/>
        <path d="M4 60 Q 25 45 55 50 Q 35 50 18 62"/>
        <path d="M4 60 Q -15 35 -30 18 Q -18 30 0 50"/>
        <path d="M4 60 Q 20 30 38 18 Q 22 32 10 52"/>
        <path d="M4 60 Q -8 80 -28 92 Q -10 82 2 70"/>
        <path d="M4 60 Q 18 82 38 92 Q 18 84 8 72"/>
        <path d="M4 60 Q 4 30 6 12"/>
      </g>
      <!-- coconuts -->
      <circle cx="2" cy="64" r="3"/>
      <circle cx="9" cy="66" r="2.6"/>
      <circle cx="-2" cy="68" r="2.4"/>
    </g>

    <!-- RIGHT PALM (shorter, leaning) -->
    <g transform="translate(135 30)">
      <path d="M0 185 Q 6 145 4 110 Q 2 85 -4 60"
            stroke-width="3" fill="none"/>
      <path d="M0 185 Q 6 145 4 110 Q 2 85 -4 60"
            stroke-width="0.9" stroke-dasharray="1.5 4" fill="none" opacity="0.7"
            transform="translate(-2 0)"/>
      <g stroke-width="2" fill="none" stroke-dasharray="2 2.5">
        <path d="M-4 60 Q -28 52 -50 60"/>
        <path d="M-4 60 Q 20 48 42 55"/>
        <path d="M-4 60 Q -18 40 -30 22"/>
        <path d="M-4 60 Q 14 38 30 22"/>
        <path d="M-4 60 Q -10 80 -22 92"/>
        <path d="M-4 60 Q 12 80 26 92"/>
        <path d="M-4 60 Q -4 32 -2 14"/>
      </g>
      <circle cx="-6" cy="64" r="2.4"/>
      <circle cx="0" cy="66" r="2.2"/>
    </g>

  </g>
</svg>
