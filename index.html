<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTU Journalism · 114 學年度畢業典禮邀請函</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Landing — warm cream gradient backdrop */
    .landing {
      background:
        linear-gradient(180deg, #fcf6e1 0%, #f9f2d6 55%, #f1e7c0 100%);
    }
    .landing-header { color: #1f4d56; }
    .landing-header .cursive {
      font-family: "Allura", cursive;
      color: #4a9ba5;
    }
    .landing-header .zh { color: #1f4d56; opacity: 0.8; }
    .landing-header .serif-en { color: #4a9ba5; opacity: 0.8; }

    .role-card {
      --card-paper: #fdfaeb;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    /* per-role color theme on cards */
    .role-card.teacher { --accent: #f6bfac; --accent-deep: #8a4733; }
    .role-card.student { --accent: #92d9e1; --accent-deep: #1f4d56; }
    .role-card.parent  { --accent: #d4b576; --accent-deep: #5a4419; }

    .role-card .card-palm  { color: var(--accent); }
    .role-card .role-en    { color: var(--accent); }
    .role-card .role-zh,
    .role-card .role-cta   { color: var(--accent-deep); }

    /* coloured border-shadow matching role */
    .role-card.teacher { box-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 18px 36px rgba(120,70,40,0.18), inset 0 0 0 3px #f6bfac, inset 0 0 60px rgba(140,110,40,0.10); }
    .role-card.student { box-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 18px 36px rgba(40,90,110,0.18), inset 0 0 0 3px #92d9e1, inset 0 0 60px rgba(40,90,110,0.10); }
    .role-card.parent  { box-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 18px 36px rgba(100,80,30,0.18), inset 0 0 0 3px #d4b576, inset 0 0 60px rgba(140,110,40,0.14); }
  </style>
</head>
<body>

  <main class="landing">
    <header class="landing-header">
      <span class="cursive">
        NTU
        <span class="line2">Journalism</span>
      </span>
      <span class="serif-en">a summer farewell — the prelude to a thousand journeys.</span>
      <span class="zh">國立臺灣大學新聞研究所 · 114 學年度畢業典禮邀請函</span>
    </header>

    <section class="cards">

      <a href="teacher.html" class="role-card teacher">
        <div class="card-palm">
          <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
            <g stroke="currentColor" stroke-linecap="round" fill="none">
              <path d="M55 130 Q 100 105 145 130 Q 100 138 55 130 Z" stroke-width="1.5" fill="currentColor" opacity="0.9"/>
            </g>
            <g stroke="currentColor" fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M82 118 Q 78 90 80 60 Q 82 40 86 22" stroke-width="2.6" fill="none"/>
              <g stroke-width="1.8" stroke-dasharray="1.6 1.8" fill="none">
                <path d="M86 22 Q 64 22 46 32"/>
                <path d="M86 22 Q 108 18 124 30"/>
                <path d="M86 22 Q 72 8 58 0"/>
                <path d="M86 22 Q 102 6 118 0"/>
                <path d="M86 22 Q 70 38 52 50"/>
                <path d="M86 22 Q 102 38 120 50"/>
              </g>
              <circle cx="84" cy="26" r="2.4"/>
              <circle cx="91" cy="28" r="2"/>
            </g>
          </svg>
        </div>
        <div class="role-en">For Mentors</div>
        <div class="role-zh">老 師 版</div>
        <div class="role-cta">杏桃粉 · Open Invitation</div>
      </a>

      <a href="student.html" class="role-card student">
        <div class="card-palm">
          <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
            <g stroke="currentColor" stroke-linecap="round" fill="none">
              <path d="M55 130 Q 100 105 145 130 Q 100 138 55 130 Z" stroke-width="1.5" fill="currentColor" opacity="0.9"/>
            </g>
            <g stroke="currentColor" fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M82 118 Q 78 90 80 60 Q 82 40 86 22" stroke-width="2.6" fill="none"/>
              <g stroke-width="1.8" stroke-dasharray="1.6 1.8" fill="none">
                <path d="M86 22 Q 64 22 46 32"/>
                <path d="M86 22 Q 108 18 124 30"/>
                <path d="M86 22 Q 72 8 58 0"/>
                <path d="M86 22 Q 102 6 118 0"/>
                <path d="M86 22 Q 70 38 52 50"/>
                <path d="M86 22 Q 102 38 120 50"/>
              </g>
              <circle cx="84" cy="26" r="2.4"/>
              <circle cx="91" cy="28" r="2"/>
            </g>
          </svg>
        </div>
        <div class="role-en">For Graduates</div>
        <div class="role-zh">同 學 版</div>
        <div class="role-cta">湖水藍 · Open Invitation</div>
      </a>

      <a href="parent.html" class="role-card parent">
        <div class="card-palm">
          <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
            <g stroke="currentColor" stroke-linecap="round" fill="none">
              <path d="M55 130 Q 100 105 145 130 Q 100 138 55 130 Z" stroke-width="1.5" fill="currentColor" opacity="0.9"/>
            </g>
            <g stroke="currentColor" fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M82 118 Q 78 90 80 60 Q 82 40 86 22" stroke-width="2.6" fill="none"/>
              <g stroke-width="1.8" stroke-dasharray="1.6 1.8" fill="none">
                <path d="M86 22 Q 64 22 46 32"/>
                <path d="M86 22 Q 108 18 124 30"/>
                <path d="M86 22 Q 72 8 58 0"/>
                <path d="M86 22 Q 102 6 118 0"/>
                <path d="M86 22 Q 70 38 52 50"/>
                <path d="M86 22 Q 102 38 120 50"/>
              </g>
              <circle cx="84" cy="26" r="2.4"/>
              <circle cx="91" cy="28" r="2"/>
            </g>
          </svg>
        </div>
        <div class="role-en">For Families</div>
        <div class="role-zh">家 長 版</div>
        <div class="role-cta">香檳米 · Open Invitation</div>
      </a>

    </section>
  </main>

</body>
</html>
